<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok На Максимум — AI Наставник</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0050;
    --cyan: #00f2ea;
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --border: rgba(255,255,255,0.07);
    --muted: #6b7280;
    --text: #ffffff;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    background: radial-gradient(circle at 50% -20%, #1a0b2e 0%, #000000 65%);
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HEADER ── */
  #header {
    text-align: center;
    padding: 28px 20px 16px;
    flex-shrink: 0;
    transition: padding 0.5s ease;
    position: relative;
  }
  #header.compact { padding: 16px 20px 8px; }

  #header h1 {
    font-size: clamp(52px, 14vw, 72px);
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    line-height: 0.85;
    transition: font-size 0.5s ease;
  }
  #header.compact h1 { font-size: clamp(28px, 7vw, 36px); }
  #header h1 .red { color: var(--red); }
  #header h1 .cyan {
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,242,234,0.5);
  }

  #subtitle {
    margin-top: 20px;
    transition: all 0.5s ease;
    overflow: hidden;
  }
  #subtitle.hidden { max-height: 0; opacity: 0; margin-top: 0; }
  #subtitle .line {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 4px;
  }
  #subtitle .line span { height: 1px; width: 24px; background: #1f2937; display: block; }
  #subtitle .label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
  }
  #subtitle .desc {
    margin-top: 20px; font-size: 14px; color: #9ca3af;
    line-height: 1.6; max-width: 280px; margin-left: auto; margin-right: auto;
  }

  /* Settings button */
  #settings-btn {
    position: absolute; top: 20px; right: 16px;
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); cursor: pointer; padding: 6px 10px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 5px; transition: all 0.2s;
  }
  #settings-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

  /* Settings panel */
  #settings-panel {
    margin: 0 16px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; display: none;
    flex-shrink: 0;
  }
  #settings-panel.open { display: block; }
  #settings-panel label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  #settings-panel input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  #settings-panel input:focus { border-color: rgba(0,242,234,0.4); }
  #settings-panel input::placeholder { color: rgba(255,255,255,0.2); }
  #settings-panel .hint {
    font-size: 12px; color: var(--muted); margin-top: 6px;
  }
  #settings-panel .hint a { color: var(--cyan); text-decoration: none; }

  /* ── CHAT ── */
  #chat {
    flex: 1; overflow-y: auto; padding: 8px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
  }
  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,0,80,0.3); border-radius: 4px; }

  .msg { display: flex; animation: fadeUp 0.35s ease-out both; }
  .msg.user { justify-content: flex-end; }
  .msg.ai { justify-content: flex-start; }

  .bubble {
    max-width: 90%; padding: 14px 16px; border-radius: 18px;
    font-size: 14px; line-height: 1.55;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--red), #9e0031);
    border-bottom-right-radius: 4px;
    color: #fff; font-weight: 600; font-size: 14px;
    border: 1px solid rgba(255,0,80,0.2);
    box-shadow: 0 4px 20px rgba(255,0,80,0.25);
  }
  .msg.ai .bubble {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    border-bottom-left-radius: 4px;
    color: #e5e7eb;
  }

  /* Formatted AI text */
  .bubble h3 {
    color: var(--red); font-weight: 900; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-top: 10px; margin-bottom: 4px;
  }
  .bubble h3:first-child { margin-top: 0; }
  .bubble p { margin: 3px 0; color: #d1d5db; font-size: 14px; }

  /* Typing dots */
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: bounce 0.9s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { background: var(--red); animation-delay: 0ms; }
  .typing-dot:nth-child(2) { background: var(--cyan); animation-delay: 150ms; }
  .typing-dot:nth-child(3) { background: var(--red); animation-delay: 300ms; }

  /* ── INPUT ── */
  #input-wrap {
    flex-shrink: 0;
    padding: 8px 16px 20px;
    background: linear-gradient(to top, #000 60%, transparent);
  }

  #input-form {
    display: flex; align-items: center;
    background: var(--surface2); border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 4px 4px 4px 20px;
    transition: border-color 0.2s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #input-form:focus-within { border-color: rgba(255,0,80,0.35); }

  #input-field {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-family: 'Inter', sans-serif;
    font-size: 16px; padding: 12px 0;
    placeholder-color: var(--muted);
  }
  #input-field::placeholder { color: #4b5563; }

  #send-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--red); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(255,0,80,0.4);
  }
  #send-btn:hover { background: #cc0040; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.25; background: #555; box-shadow: none; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 18px; height: 18px; transform: rotate(90deg); }

  /* Reset */
  #reset-wrap {
    text-align: center; margin-top: 10px;
    display: none;
  }
  #reset-wrap.visible { display: block; }
  #reset-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px; background: var(--surface);
    border: 1px solid rgba(0,242,234,0.25); border-radius: 50px;
    color: var(--cyan); font-size: 10px; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    animation: glowPulse 2.5s infinite ease-in-out;
  }
  #reset-btn:hover { background: rgba(0,242,234,0.08); }
  #reset-btn svg { width: 14px; height: 14px; }

  /* Ping dot */
  .ping-dot {
    position: absolute; top: 20px; right: 60px;
    width: 6px; height: 6px;
  }
  .ping-dot::before, .ping-dot::after {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: var(--red);
  }
  .ping-dot::before { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; opacity: 0.6; }

  /* ── QUICK PROMPTS ── */
  #quick-prompts {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 16px 12px;
    flex-shrink: 0;
    transition: all 0.4s ease;
    overflow: hidden;
  }
  #quick-prompts.hidden { max-height: 0; padding-bottom: 0; opacity: 0; }
  .quick-chip {
    padding: 7px 14px; border-radius: 50px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; color: #9ca3af; cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s; white-space: nowrap;
  }
  .quick-chip:hover { border-color: rgba(255,0,80,0.4); color: #fff; background: rgba(255,0,80,0.06); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
  @keyframes ping {
    75%, 100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(0,242,234,0.15); }
    50% { box-shadow: 0 0 14px rgba(0,242,234,0.4); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="ping-dot"></div>
    <button id="settings-btn" onclick="toggleSettings()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      API ключ
    </button>
    <h1>TIKTOK <span class="red">НА</span><br><span class="cyan">МАКСИМУМ</span></h1>
    <div id="subtitle">
      <div class="line"><span></span><span class="label">Твій AI-Наставник Віталік</span><span></span></div>
      <p class="desc">Запитай про упаковку профілю, ідеї для відео або як продавати в TikTok 🚀</p>
    </div>
  </header>

  <!-- Settings -->
  <div id="settings-panel">
    <label>Gemini API Ключ (безкоштовний)</label>
    <input type="password" id="api-key-input" placeholder="AIzaSy..." oninput="saveKey()">
    <p class="hint">Отримай безкоштовно: <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API key</p>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Quick prompts -->
  <div id="quick-prompts">
    <button class="quick-chip" onclick="sendQuick('Як оформити TikTok профіль з нуля?')">📱 Оформлення профілю</button>
    <button class="quick-chip" onclick="sendQuick('Як написати ідеальний біо для TikTok?')">✍️ Біо-опис</button>
    <button class="quick-chip" onclick="sendQuick('Які гачки найкраще працюють у відео?')">🎣 Гачки для відео</button>
    <button class="quick-chip" onclick="sendQuick('Як продавати через TikTok Директ?')">💰 Продажі в Директі</button>
    <button class="quick-chip" onclick="sendQuick('Скільки відео на тиждень публікувати?')">📅 Частота постингу</button>
    <button class="quick-chip" onclick="sendQuick('CapCut чи Edits — що краще для монтажу?')">🎬 Монтаж</button>
  </div>

  <!-- Input -->
  <div id="input-wrap">
    <form id="input-form" onsubmit="handleSubmit(event)">
      <input id="input-field" type="text" placeholder="Що підказати?" autocomplete="off" autofocus>
      <button id="send-btn" type="submit" disabled>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </form>
    <div id="reset-wrap">
      <button id="reset-btn" onclick="resetChat()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        На головну
      </button>
    </div>
  </div>

</div>

<script>
const GEMINI_MODEL = 'gemini-2.0-flash';

const KNOWLEDGE_BASE = `
ОСНОВНІ ПРИНЦИПИ TIKTOK (2025-2026):
- TikTok — це нова пошукова система. 40% молоді шукають тут інформацію замість Google.
- Алгоритм оцінює ВІДЕО, а не акаунт. Кожне відео — окремий тест.
- Головна метрика №1 — УТРИМАННЯ УВАГИ.
- Гачок (перші 3 секунди) = 51% успіху.
- Формула успішного відео: Гачок (зупинити увагу) + Сенс (донести думку) + CTA (заклик до дії).

ЕТАП 1: ФУНДАМЕНТ ТА ПРОФІЛЬ
- Вибір між Акаунтом Автора (тренді звуки, Creator Marketplace) та Бізнес-акаунтом (реклама, посилання без 1000 підп., аналітика).
- Профіль — це міні-лендінг. 5 кроків оптимізації:
  1. Аватар (крупний план, без фільтрів, логотип компанії).
  2. Нікнейм (короткий, до 15 симв., без цифр, ключове слово ніші).
  3. Опис/Біо (Формула: Хто/Що/Чому + Заклик. 80 символів).
  4. Соціальний доказ (докази успіху, промокоди).
  5. Посилання (Бізнес-акаунт відразу, авторський від 1000 підп.).

ЕТАП 2: КОНТЕНТ ТА АЛГОРИТМИ
- 4 типи контенту:
  1. Охоплення (знайомство, міфи, помилки — 40%).
  2. Довіра (свій шлях, досвід, думки — 30%).
  3. Користь (чек-листи, інструкції — 20%).
  4. Заявки/Продаж (рішення, кейси, процеси — 10%).
- Прогрів акаунту (3 дні): День 1 — дослідження ніші, День 2 — взаємодія (лайки/коменти), День 3 — підписки на експертів.
- Зйомка: Вертикально, на рівні очей, чистий звук, 1 відео щодня краще ніж 1 ідеальне на тиждень.

ЕТАП 3: МОНТАЖ (CapCut vs Edits)
- CapCut: складніший, більше функцій, шаблони, краще для складного контенту.
- Edits: максимально простий, швидкий, мінімум дій, ідеально для початківців.
- Монтаж має займати 10-20 хв. Не ускладнюйте!
- Текст у відео критично важливий, бо багато дивляться без звуку.

ЕТАП 4: ПРОДАЖІ В ДІРЕКТІ
- Продаж — це не тиснути, а допомогти.
- Скрипт: Вхід у діалог → Уточнення запиту → Відображення (мене зрозуміли) → М'яка пропозиція → Ціна як факт.
- Робота з запереченнями:
  "Дорого" — розповіж про цінність і результат.
  "Треба подумати" — не тисніть, дайте простір.
  "Не впевнений" — уточніть що саме викликає сумнів.

ТОП 30 ГАЧКІВ:
- "99% людей роблять цю помилку в [ТЕМА]"
- "Тобі не потрібен [МІФ], щоб [РЕЗУЛЬТАТ]"
- "3 кроки, щоб почати [ТЕМА] правильно"
- "Я б ніколи не починав [ТЕМА], якби знав це раніше"
- "Цей простий крок змінює все"
- "Стоп! Якщо ти [ЦЕ] — ця відео для тебе"
- "Ніхто не говорить правду про [ТЕМА]"
- "Чому я кинув [МІФ] і що зробив замість"
- "Мій результат за [СТРОК] без [МІФ]"
- "Що буде якщо [СЦЕНАРІЙ]?"
`;

const SYSTEM_PROMPT = `Ти — AI-наставник Віталік, експерт з TikTok маркетингу з 10+ роками досвіду.
Допомагаєш будувати успішні акаунти на основі бази знань. Відповідаєш ТІЛЬКИ українською.

СТИЛЬ:
- Коротко і по суті. Без "води".
- Використовуй емодзі для кожного пункту.
- Звертайся на "ти", будь дружнім наставником.
- Заголовки: [H]ТЕКСТ[/H]. НЕ використовуй ### або ***.
- Розділяй думки новими рядками.

БАЗА ЗНАНЬ:
${KNOWLEDGE_BASE}`;

// ── STATE ──
let messages = [];
let isLoading = false;
let hasStarted = false;

// ── INIT ──
const savedKey = localStorage.getItem('gemini_key');
if (savedKey) {
  document.getElementById('api-key-input').value = savedKey;
} else {
  document.getElementById('settings-panel').classList.add('open');
}

document.getElementById('input-field').addEventListener('input', function() {
  document.getElementById('send-btn').disabled = !this.value.trim() || isLoading;
});

// ── SETTINGS ──
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}
function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (k) localStorage.setItem('gemini_key', k);
}

// ── SUBMIT ──
async function handleSubmit(e) {
  e.preventDefault();
  const field = document.getElementById('input-field');
  const text = field.value.trim();
  if (!text || isLoading) return;

  const key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('api-key-input').focus();
    return;
  }

  field.value = '';
  document.getElementById('send-btn').disabled = true;
  await sendMessage(text, key);
}

function sendQuick(text) {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('api-key-input').focus();
    return;
  }
  sendMessage(text, key);
}

async function sendMessage(text, key) {
  if (!hasStarted) activateChat();

  messages.push({ role: 'user', text });
  appendBubble('user', text);
  const typingEl = appendTyping();

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const contents = messages.map(m => ({
      role: m.role === 'ai' ? 'model' : 'user',
      parts: [{ text: m.text }]
    }));

    const body = {
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents,
      generationConfig: { temperature: 0.65, maxOutputTokens: 1024 }
    };

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );

    typingEl.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.error?.message || `Помилка ${res.status}`;
      if (res.status === 400 && msg.includes('API_KEY')) throw new Error('Невалідний API ключ. Перевір у налаштуваннях.');
      if (res.status === 403) throw new Error('Доступ заборонено. Перевір API ключ.');
      throw new Error(msg);
    }

    const data = await res.json();
    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!aiText) throw new Error('Пуста відповідь. Спробуй ще раз.');

    messages.push({ role: 'ai', text: aiText });
    appendBubble('ai', aiText);

  } catch (err) {
    typingEl?.remove();
    appendBubble('ai', `⚠️ ${err.message || 'Сталася помилка. Спробуй ще раз.'}`);
  } finally {
    isLoading = false;
    const field = document.getElementById('input-field');
    document.getElementById('send-btn').disabled = !field.value.trim();
    scrollChat();
  }
}

// ── UI ──
function activateChat() {
  hasStarted = true;
  document.getElementById('header').classList.add('compact');
  document.getElementById('subtitle').classList.add('hidden');
  document.getElementById('quick-prompts').classList.add('hidden');
  document.getElementById('reset-wrap').classList.add('visible');
  document.getElementById('settings-panel').classList.remove('open');
}

function resetChat() {
  messages = [];
  hasStarted = false;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('header').classList.remove('compact');
  document.getElementById('subtitle').classList.remove('hidden');
  document.getElementById('quick-prompts').classList.remove('hidden');
  document.getElementById('reset-wrap').classList.remove('visible');
  document.getElementById('input-field').focus();
}

function appendBubble(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'ai') {
    bubble.innerHTML = formatText(text);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  chat.appendChild(div);
  scrollChat();
  return div;
}

function appendTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="bubble" style="display:flex;align-items:center;gap:6px;padding:14px 16px">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;
  chat.appendChild(div);
  scrollChat();
  return div;
}

function formatText(text) {
  return text
    .replace(/\[H\](.*?)\[\/H\]/gi, '<h3>$1</h3>')
    .split('\n')
    .map(line => {
      const clean = line.replace(/[#*]{2,}/g, '').trim();
      if (!clean) return '<div style="height:4px"></div>';
      return `<p>${escHtml(clean)}</p>`;
    })
    .join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollChat() {
  const chat = document.getElementById('chat');
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}
</script>
</body>
</html>
