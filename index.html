<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok На Максимум — AI Наставник</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0050;
    --cyan: #00f2ea;
    --bg: #000;
    --s1: #0a0a0a;
    --s2: #111;
    --border: rgba(255,255,255,0.07);
    --muted: #6b7280;
  }

  html { height: 100%; }

  body {
    height: 100%; width: 100%;
    background: radial-gradient(ellipse at 50% 0%, #1a0b2e 0%, #000 60%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    max-width: 520px;
  }

  /* ── HEADER ── */
  #header {
    text-align: center;
    padding: 32px 20px 20px;
    flex-shrink: 0;
    transition: padding 0.5s ease;
  }
  #header.compact { padding: 14px 20px 10px; }

  h1 {
    font-size: clamp(48px, 13vw, 80px);
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    line-height: 0.88;
    transition: font-size 0.5s ease;
    display: block;
  }
  #header.compact h1 { font-size: clamp(26px, 6vw, 34px); }
  .red { color: var(--red); }
  .cyan { color: var(--cyan); text-shadow: 0 0 22px rgba(0,242,234,0.55); }

  #subtitle {
    margin-top: 18px;
    opacity: 1;
    max-height: 200px;
    transition: all 0.45s ease;
    overflow: hidden;
  }
  #subtitle.hidden { max-height: 0; opacity: 0; margin-top: 0; pointer-events: none; }

  .sub-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sub-label::before, .sub-label::after {
    content: '';
    height: 1px;
    width: 28px;
    background: #1f2937;
    display: block;
  }
  .sub-label span {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sub-desc {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto;
  }

  /* Ping dot */
  .ping {
    display: inline-block;
    width: 7px; height: 7px;
    position: relative;
    vertical-align: middle;
    margin-right: 4px;
  }
  .ping::before, .ping::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--red);
  }
  .ping::before { animation: pingAnim 1.8s cubic-bezier(0,0,0.2,1) infinite; opacity: 0.6; }

  /* ── CHAT ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overscroll-behavior: contain;
  }
  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,0,80,0.25); border-radius: 4px; }

  .msg { display: flex; animation: fadeUp 0.35s ease-out both; }
  .msg.user { justify-content: flex-end; }
  .msg.ai   { justify-content: flex-start; }

  .bubble {
    max-width: 88%;
    padding: 13px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #ff0050, #9e0031);
    border-bottom-right-radius: 4px;
    color: #fff;
    font-weight: 600;
    border: 1px solid rgba(255,0,80,0.2);
    box-shadow: 0 4px 20px rgba(255,0,80,0.22);
  }
  .msg.ai .bubble {
    background: var(--s1);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: #d1d5db;
  }
  .bubble .ai-head {
    color: var(--red);
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bubble h3 {
    color: var(--red);
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 10px 0 5px;
  }
  .bubble h3:first-child { margin-top: 0; }
  .bubble p { margin: 3px 0; font-size: 14px; color: #d1d5db; }
  .bubble ul { padding-left: 4px; list-style: none; }
  .bubble li { padding: 3px 0; font-size: 14px; color: #d1d5db; }

  /* Typing */
  .typing-bubble {
    background: var(--s1);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    border-radius: 18px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: bounce 0.9s infinite ease-in-out;
  }
  .dot:nth-child(1) { background: var(--red);  animation-delay: 0ms; }
  .dot:nth-child(2) { background: var(--cyan); animation-delay: 150ms; }
  .dot:nth-child(3) { background: var(--red);  animation-delay: 300ms; }

  /* ── QUICK PROMPTS ── */
  #quick-wrap {
    flex-shrink: 0;
    padding: 4px 16px 8px;
    overflow-y: auto;
    max-height: 40vh;
    opacity: 1;
    transition: opacity 0.4s ease;
    scrollbar-width: none;
  }
  #quick-wrap::-webkit-scrollbar { display: none; }
  #quick-wrap.hidden { max-height: 0; opacity: 0; padding: 0 16px; pointer-events: none; overflow: hidden; }

  #quick-scroll {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .chip {
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    color: #9ca3af;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.3;
  }
  .chip:hover { border-color: rgba(255,0,80,0.5); color: #fff; background: rgba(255,0,80,0.07); }

  /* ── INPUT ── */
  #input-area {
    flex-shrink: 0;
    padding: 6px 16px 24px;
    background: linear-gradient(to top, #000 55%, transparent);
  }

  #input-form {
    display: flex;
    align-items: center;
    background: var(--s2);
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.09);
    padding: 4px 4px 4px 18px;
    transition: border-color 0.2s;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
  }
  #input-form:focus-within { border-color: rgba(255,0,80,0.4); }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 11px 0;
    min-width: 0;
  }
  #msg-input::placeholder { color: #374151; }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 50%; border: none;
    background: var(--red); color: #fff;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(255,0,80,0.38);
  }
  #send-btn:hover { background: #cc0040; transform: scale(1.06); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.22; background: #444; box-shadow: none; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; transform: rotate(90deg); }

  #reset-row {
    text-align: center;
    margin-top: 10px;
    min-height: 36px;
  }
  #reset-btn {
    display: none;
    align-items: center; gap: 8px;
    padding: 8px 22px;
    background: var(--s1);
    border: 1px solid rgba(0,242,234,0.25);
    border-radius: 50px;
    color: var(--cyan);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    animation: glowPulse 2.5s infinite ease-in-out;
  }
  #reset-btn.visible { display: inline-flex; }
  #reset-btn:hover { background: rgba(0,242,234,0.07); }
  #reset-btn svg { width: 14px; height: 14px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-7px); }
  }
  @keyframes pingAnim {
    75%, 100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(0,242,234,0.15); }
    50%       { box-shadow: 0 0 14px rgba(0,242,234,0.45); }
  }
</style>
</head>

const GEMINI_KEY = 'AIzaSyBi6swlWBHXDt63-zay4WasCFQZzUc8QCE';
const GEMINI_MODEL = 'gemini-2.5-flash';

const SYSTEM_PROMPT = `Ти — AI-наставник Віталік, експерт з TikTok маркетингу з 10+ роками досвіду.
Допомагаєш будувати успішні TikTok акаунти. Відповідаєш ТІЛЬКИ українською мовою.

СТИЛЬ ВІДПОВІДЕЙ:
- Коротко і конкретно. Без "води" і загальних фраз.
- Використовуй емодзі на початку кожного пункту.
- Звертайся на "ти", будь дружнім наставником.
- Заголовки: [H]ТЕКСТ[/H]. НЕ використовуй ### або ***.
- Розділяй думки новими рядками.
- Давай дієві поради, які можна застосувати одразу.

БАЗА ЗНАНЬ ПРО TIKTOK:
${buildKB()}`;

function buildKB() {
  return KB.map(item => item.title + '\n' + item.answer.replace(/\[H\]|\[\/H\]/gi, '')).join('\n\n');
}

const history = [];

async function getAIResponse(userText) {
  // Додаємо до history тільки після успіху
  const newEntry = { role: 'user', parts: [{ text: userText }] };
  const snapshot = [...history, newEntry];

  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: snapshot,
    generationConfig: { temperature: 0.65, maxOutputTokens: 1024 }
  };

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Помилка API: ${res.status}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Пуста відповідь від Gemini');

  // Тільки тут оновлюємо history — якщо все пройшло успішно
  history.push(newEntry);
  history.push({ role: 'model', parts: [{ text }] });
  return text;
}

// Локальний пошук як резервний варіант
function findLocal(q) {
  const low = q.toLowerCase().replace(/ї/g,'і').replace(/є/g,'е').replace(/ґ/g,'г');
  let best = null, bestScore = 0;
  for (const item of KB) {
    let score = 0;
    for (const kw of item.keys) {
      const k = kw.toLowerCase().replace(/ї/g,'і').replace(/є/g,'е').replace(/ґ/g,'г');
      if (low.includes(k)) score += k.length;
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return (best && bestScore >= 3) ? best.answer : FALLBACK;
}

let started = false;
let busy = false;

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
const chat      = document.getElementById('chat');
const input     = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const header    = document.getElementById('header');
const subtitle  = document.getElementById('subtitle');
const quickWrap = document.getElementById('quick-wrap');
const resetBtn  = document.getElementById('reset-btn');

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || busy;
});

function activateChat() {
  started = true;
  header.classList.add('compact');
  subtitle.classList.add('hidden');
  quickWrap.classList.add('hidden');
  resetBtn.classList.add('visible');
}

function resetChat() {
  started = false;
  busy = false;
  history.length = 0;
  chat.innerHTML = '';
  header.classList.remove('compact');
  subtitle.classList.remove('hidden');
  quickWrap.classList.remove('hidden');
  resetBtn.classList.remove('visible');
  input.value = '';
  sendBtn.disabled = true;
  input.focus();
}

function scrollChat() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 40);
}

function addBubble(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  if (role === 'user') {
    bub.textContent = html;
  } else {
    bub.innerHTML = '<div class="ai-head"><span style="color:var(--red)">●</span> Наставник Віталік</div>' + formatAI(html);
  }
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollChat();
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(wrap);
  scrollChat();
  return wrap;
}

function formatAI(text) {
  return text
    .replace(/\[H\](.*?)\[\/H\]/gi, '<h3>$1</h3>')
    .split('\n')
    .map(line => {
      const t = line.trim();
      if (!t) return '<div style="height:3px"></div>';
      return '<p>' + t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
    })
    .join('');
}

// ─────────────────────────────────────────────
//  SEND
// ─────────────────────────────────────────────
function handleSubmit(e) {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = '';
  sendBtn.disabled = true;
  ask(text);
}

async function ask(text) {
  if (busy) return;
  if (!started) activateChat();

  addBubble('user', text);
  busy = true;
  sendBtn.disabled = true;

  const typing = addTyping();

  try {
    const answer = await getAIResponse(text);
    typing.remove();
    addBubble('ai', answer);
  } catch (err) {
    typing.remove();
    addBubble('ai', `⚠️ Помилка: ${err.message}\n\nПеревір підключення до інтернету або спробуй ще раз.`);
    console.error('Gemini error:', err);
  } finally {
    busy = false;
    sendBtn.disabled = !input.value.trim();
  }
}
</script>
