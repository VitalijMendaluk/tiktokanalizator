<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Генератор Сценаріїв — TikTok</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0050;
    --cyan: #00f2ea;
    --bg: #000;
    --s1: #0a0a0a;
    --s2: #111;
    --s3: #161616;
    --border: rgba(255,255,255,0.07);
    --muted: #6b7280;
  }

  html { height: 100%; }

  body {
    min-height: 100%;
    background: radial-gradient(ellipse at 50% 0%, #1a0b2e 0%, #000 60%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 36px 0 28px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 20px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 50px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
  .back-btn svg { width: 12px; height: 12px; }

  h1 {
    font-size: clamp(40px, 11vw, 64px);
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    line-height: 0.88;
  }
  .red  { color: var(--red); }
  .cyan { color: var(--cyan); text-shadow: 0 0 22px rgba(0,242,234,0.5); }

  .sub {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── CARD ── */
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px; height: 14px;
    border-radius: 2px;
    background: linear-gradient(to bottom, var(--red), var(--cyan));
    display: block;
    flex-shrink: 0;
  }

  /* ── INPUTS ── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: rgba(255,0,80,0.4);
  }
  input::placeholder, textarea::placeholder { color: #374151; }
  textarea { resize: none; height: 80px; line-height: 1.5; }

  /* ── GENERATE BUTTON ── */
  #gen-btn {
    width: 100%;
    padding: 17px;
    border: none;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: linear-gradient(90deg, var(--red), #ff6b8a, var(--cyan), var(--red));
    background-size: 300% 100%;
    animation: gradShift 4s ease infinite;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 8px 32px rgba(255,0,80,0.3);
  }
  #gen-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,0,80,0.45); }
  #gen-btn:active { transform: translateY(0); }
  #gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; animation: none; background: #333; box-shadow: none; }
  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── LOADER ── */
  #loader {
    display: none;
    text-align: center;
    padding: 40px 0;
  }
  #loader.active { display: block; }

  .loader-icon {
    width: 52px; height: 52px;
    margin: 0 auto 16px;
    animation: spinIcon 1.4s cubic-bezier(0.68,-0.55,0.27,1.55) infinite;
  }
  @keyframes spinIcon {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(0.78); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .loader-text {
    font-size: 14px;
    color: var(--muted);
  }
  .animated-dots span { animation: blinkDot 1.4s infinite both; }
  .animated-dots span:nth-child(2) { animation-delay: 0.2s; }
  .animated-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blinkDot { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* ── RESULTS ── */
  #results {
    display: none;
  }
  #results.visible {
    display: block;
    animation: fadeUp 0.4s ease-out both;
  }

  .section-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-red  { background: var(--red); }
  .dot-cyan { background: var(--cyan); }
  .dot-white { background: rgba(255,255,255,0.4); }

  .result-text {
    font-size: 15px;
    color: #e5e7eb;
    line-height: 1.65;
  }
  .result-text p { margin: 5px 0; }
  .result-text h4 {
    color: var(--red);
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 12px 0 6px;
  }
  .result-text h4:first-child { margin-top: 0; }

  .hook-box {
    background: linear-gradient(135deg, rgba(255,0,80,0.1), rgba(0,242,234,0.05));
    border: 1px solid rgba(255,0,80,0.25);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    color: #fff;
    position: relative;
    margin-bottom: 4px;
  }
  .hook-quote {
    position: absolute;
    top: 12px; left: 16px;
    font-size: 36px;
    line-height: 1;
    color: var(--red);
    opacity: 0.3;
    font-family: Georgia, serif;
  }
  .hook-text { padding-left: 8px; padding-top: 8px; }

  /* Copy block */
  .copy-block {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.6;
    position: relative;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    width: fit-content;
  }
  .copy-btn:hover { background: rgba(0,242,234,0.08); border-color: rgba(0,242,234,0.3); color: var(--cyan); }
  .copy-btn.copied { color: var(--cyan); border-color: rgba(0,242,234,0.4); background: rgba(0,242,234,0.06); }
  .copy-btn svg { width: 13px; height: 13px; }

  /* Tags */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
  .tag {
    background: rgba(255,0,80,0.08);
    border: 1px solid rgba(255,0,80,0.2);
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Error */
  .error-box {
    background: rgba(255,0,80,0.08);
    border: 1px solid rgba(255,0,80,0.25);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: #fca5a5;
    display: none;
    margin-bottom: 12px;
  }
  .error-box.visible { display: flex; gap: 10px; align-items: flex-start; }

  /* Reset */
  .reset-wrap { text-align: center; margin-top: 8px; }
  .reset-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    background: var(--s1);
    border: 1px solid rgba(0,242,234,0.25);
    border-radius: 50px;
    color: var(--cyan);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    animation: glowPulse 2.5s infinite ease-in-out;
  }
  .reset-btn:hover { background: rgba(0,242,234,0.07); }
  .reset-btn svg { width: 14px; height: 14px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(0,242,234,0.12); }
    50%       { box-shadow: 0 0 14px rgba(0,242,234,0.4); }
  }

  /* footer */
  .footer {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.12);
    padding-top: 16px;
    letter-spacing: 0.08em;
  }
  .footer span { color: var(--red); }
</style>
</head>
<body>
<div class="container">

  <header>
    <a href="index.html" class="back-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
      </svg>
      Наставник Віталік
    </a>
    <h1>ГЕНЕРАТОР<br><span class="red">СЦЕ</span><span class="cyan">НАРІЮ</span></h1>
    <p class="sub">Введи нішу і аудиторію — отримай готовий сценарій для TikTok</p>
  </header>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="card-title">Дані для генерації</div>

    <div class="field">
      <label>Твоя ніша / тема відео</label>
      <input type="text" id="niche" placeholder="Наприклад: фітнес для зайнятих, SMM, фінанси...">
    </div>

    <div class="field">
      <label>Цільова аудиторія</label>
      <input type="text" id="audience" placeholder="Наприклад: мами у декреті, підприємці 25-40 років...">
    </div>

    <div class="field">
      <label>Мета відео <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#4b5563">(необов'язково)</span></label>
      <input type="text" id="goal" placeholder="Наприклад: набрати підписників, продати курс...">
    </div>

    <div style="height:4px"></div>
    <div class="error-box" id="error-box">⚠️ <span id="error-text"></span></div>
    <button id="gen-btn" onclick="generate()">⚡ Згенерувати сценарій</button>
  </div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-icon">
      <svg viewBox="0 0 52 52" fill="none" width="52" height="52">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff0050"/>
            <stop offset="100%" stop-color="#00f2ea"/>
          </linearGradient>
        </defs>
        <path d="M21.5 6h9v25.5a8 8 0 1 1-9-7.9V15.1A17 17 0 1 0 38.5 31.5V16a18.9 18.9 0 0 0 8 1.6V9a10 10 0 0 1-8-3.2" fill="url(#lg)"/>
      </svg>
    </div>
    <p class="loader-text">Генерую сценарій<span class="animated-dots"><span>.</span><span>.</span><span>.</span></span></p>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <!-- HOOK -->
    <div class="card">
      <div class="card-title"><span class="dot dot-red"></span>Гачок — перші 3 секунди</div>
      <div class="hook-box">
        <div class="hook-quote">"</div>
        <div class="hook-text" id="r-hook"></div>
      </div>
    </div>

    <!-- SCRIPT -->
    <div class="card">
      <div class="card-title"><span class="dot dot-white"></span>Сценарій відео</div>
      <div class="result-text" id="r-script"></div>
    </div>

    <!-- CTA -->
    <div class="card">
      <div class="card-title"><span class="dot dot-cyan"></span>Заклик до дії (CTA)</div>
      <div class="result-text" id="r-cta"></div>
    </div>

    <!-- DESCRIPTION -->
    <div class="card">
      <div class="card-title"><span class="dot dot-white"></span>Опис для TikTok</div>
      <div class="copy-block" id="r-desc"></div>
      <button class="copy-btn" id="copy-desc-btn" onclick="copyBlock('r-desc', 'copy-desc-btn')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Копіювати опис
      </button>
    </div>

    <!-- HASHTAGS -->
    <div class="card">
      <div class="card-title"><span class="dot dot-red"></span>Хештеги</div>
      <div class="tags-wrap" id="r-tags"></div>
      <button class="copy-btn" id="copy-tags-btn" onclick="copyTags('copy-tags-btn')" style="margin-top:14px">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Копіювати хештеги
      </button>
    </div>

    <div class="reset-wrap">
      <button class="reset-btn" onclick="resetForm()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Новий сценарій
      </button>
    </div>

  </div>


</div>
<script>

let lastTags = [];

const PROMPT = (niche, audience, goal) => `Ти — топ TikTok-сценарист. Створи готовий сценарій для відео ТІЛЬКИ українською мовою.

Ніша: ${niche}
Аудиторія: ${audience}
${goal ? `Мета: ${goal}` : ''}

Відповідь ТІЛЬКИ у JSON, без будь-якого тексту до або після. Структура:
{
  "hook": "чіпляючий гачок-фраза для перших 3 секунд відео (одне речення, максимально конкретне)",
  "script": [
    "Теза 1 — що сказати",
    "Теза 2 — що сказати",
    "Теза 3 — що сказати",
    "Теза 4 — що сказати"
  ],
  "cta": "конкретний заклик до дії в кінці відео",
  "description": "короткий опис для TikTok (2-3 речення з емодзі, до 150 символів)",
  "hashtags": ["#хештег1", "#хештег2", "#хештег3", "#хештег4", "#хештег5", "#хештег6", "#хештег7"]
}`;

async function generate() {
  const niche    = document.getElementById('niche').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const goal     = document.getElementById('goal').value.trim();

  if (!niche || !audience) {
    showError('Заповни нішу і цільову аудиторію');
    return;
  }

  hideError();
  setLoading(true);

  try {
    const body = {
      contents: [{ role: 'user', parts: [{ text: PROMPT(niche, audience, goal) }] }],
      generationConfig: {
        temperature: 0.8,
        maxOutputTokens: 2048,
        responseMimeType: 'application/json'
      }
    };

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Помилка API: ${res.status}`);
    }

    const data = await res.json();
    const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!raw) throw new Error('Пуста відповідь від Gemini');

    const match = raw.match(/\{[\s\S]*\}/);
    const json  = JSON.parse(match ? match[0] : raw);
    renderResults(json);

  } catch (err) {
    showError(err.message || 'Сталася помилка. Спробуй ще раз.');
  } finally {
    setLoading(false);
  }
}

function renderResults(d) {
  // Hook
  document.getElementById('r-hook').textContent = d.hook || '';

  // Script
  const scriptEl = document.getElementById('r-script');
  scriptEl.innerHTML = '';
  (d.script || []).forEach((line, i) => {
    const p = document.createElement('p');
    p.style.cssText = 'padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px;align-items:flex-start';
    p.innerHTML = `<span style="color:var(--red);font-weight:800;font-size:13px;flex-shrink:0;margin-top:1px">${String(i+1).padStart(2,'0')}</span><span>${esc(line)}</span>`;
    if (i === (d.script.length - 1)) p.style.borderBottom = 'none';
    scriptEl.appendChild(p);
  });

  // CTA
  document.getElementById('r-cta').innerHTML = `<p style="font-size:15px;font-weight:600;color:#fff">${esc(d.cta || '')}</p>`;

  // Description
  document.getElementById('r-desc').textContent = d.description || '';

  // Hashtags
  lastTags = d.hashtags || [];
  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = lastTags.map(h => `<span class="tag">${esc(h)}</span>`).join('');

  document.getElementById('results').classList.add('visible');
  setTimeout(() => document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function resetForm() {
  document.getElementById('results').classList.remove('visible');
  document.getElementById('niche').value = '';
  document.getElementById('audience').value = '';
  document.getElementById('goal').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => document.getElementById('niche').focus(), 400);
}

function setLoading(on) {
  document.getElementById('loader').classList.toggle('active', on);
  document.getElementById('gen-btn').disabled = on;
  if (on) document.getElementById('results').classList.remove('visible');
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-box').classList.add('visible');
}
function hideError() {
  document.getElementById('error-box').classList.remove('visible');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyBlock(id, btnId) {
  const text = document.getElementById(id).textContent.trim();
  copyToClipboard(text, btnId);
}

function copyTags(btnId) {
  const text = lastTags.join(' ');
  copyToClipboard(text, btnId);
}

function copyToClipboard(text, btnId) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> Скопійовано`;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Копіювати`;
    }, 2200);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
</script>
</body>
